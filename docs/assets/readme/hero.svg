<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title description">
  <title id="title">Meridian LMS</title>
  <desc id="description">A secure, role-aware learning management system built with microservices.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1600" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17172E"/>
      <stop offset="0.55" stop-color="#2B2B61"/>
      <stop offset="1" stop-color="#5C5CE5"/>
    </linearGradient>
    <linearGradient id="panel" x1="970" y1="95" x2="1500" y2="445" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.07"/>
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" stroke="#FFFFFF" stroke-opacity="0.065"/>
    </pattern>
    <filter id="shadow" x="900" y="55" width="650" height="430" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#0B0B1A" flood-opacity="0.32"/>
    </filter>
  </defs>

  <rect width="1600" height="520" rx="28" fill="url(#background)"/>
  <rect width="1600" height="520" rx="28" fill="url(#grid)"/>
  <circle cx="1450" cy="40" r="260" fill="#8C8CFF" fill-opacity="0.12"/>
  <circle cx="1340" cy="520" r="220" fill="#11112A" fill-opacity="0.22"/>

  <g transform="translate(90 72)">
    <rect width="58" height="58" rx="15" fill="#6C6CF4"/>
    <path d="M16 39V19H22L29 31L36 19H42V39H36V28L31 37H27L22 28V39H16Z" fill="white"/>
    <text x="76" y="38" fill="white" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Meridian LMS</text>
  </g>

  <text x="90" y="202" fill="#BDBDFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="2.2">LEARN · BUILD · ADVANCE</text>
  <text x="90" y="266" fill="white" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="750">A complete LMS,</text>
  <text x="90" y="326" fill="white" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="54" font-weight="750">shaped like a real product.</text>
  <text x="90" y="372" fill="#D8D8F4" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="20">Secure accounts, course delivery, quizzes, payments, AI support and analytics.</text>

  <g transform="translate(90 414)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="650">
    <rect width="136" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.11" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <circle cx="22" cy="21" r="5" fill="#7BE5B5"/>
    <text x="36" y="26" fill="white">Docker ready</text>
    <rect x="148" width="130" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.11" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <circle cx="170" cy="21" r="5" fill="#B9B9FF"/>
    <text x="184" y="26" fill="white">JWT secured</text>
    <rect x="290" width="160" height="42" rx="21" fill="#FFFFFF" fill-opacity="0.11" stroke="#FFFFFF" stroke-opacity="0.18"/>
    <circle cx="312" cy="21" r="5" fill="#FFD48A"/>
    <text x="326" y="26" fill="white">Database per service</text>
