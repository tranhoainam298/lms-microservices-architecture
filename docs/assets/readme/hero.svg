    <rect x="1134" y="214" width="220" height="18" rx="9" fill="white" fill-opacity="0.92"/>
    <rect x="1134" y="246" width="290" height="7" rx="3.5" fill="#FFFFFF" fill-opacity="0.17"/>
    <rect x="1134" y="246" width="188" height="7" rx="3.5" fill="#7777F7"/>

